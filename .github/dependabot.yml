version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    assignees:
      - "jasonhaak"
    commit-message:
      prefix: "deps"
    versioning-strategy: increase-if-necessary
    groups:
      runtime:
        dependency-type: "production"
      dev:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    assignees:
      - "jasonhaak"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
